<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narrow Write — write without looking back</title>
  <link rel="icon" href="assets/nw.png" type="image/png">

  <!-- Apply theme before render to prevent flash -->
  <script>
    (function () {
      const _s = localStorage.getItem('narrowwrite_settings');
      const theme = _s ? (JSON.parse(_s).theme || 'dark') : 'dark';
      const resolved = theme === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : theme;
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    /* ── Tokens ────────────────────────────────────────────────────── */
    :root {
      --bg:           #1a1a1a;
      --text:         #e8e4dc;
      --muted:        rgba(232, 228, 220, 0.45);
      --border:       rgba(255, 255, 255, 0.1);
      --popover-bg:   #222222;
      --blur-amount:  8px;
      --haze-opacity: 1;
      --fade:         180ms ease;
    }

    [data-theme="light"] {
      --bg:         #faf8f5;
      --text:       #1a1a1a;
      --muted:      rgba(26, 26, 26, 0.42);
      --border:     rgba(0, 0, 0, 0.1);
      --popover-bg: #f0ede8;
    }

    /* High contrast light — white bg, black text */
    [data-theme="hc-light"] {
      --bg:           #ffffff;
      --text:         #000000;
      --muted:        #000000;
      --border:       #000000;
      --popover-bg:   #ffffff;
      --haze-opacity: 1;
      --fade:         0ms;   /* no transitions — prevents e-ink ghosting */
    }

    /* High contrast dark — black bg, white text */
    [data-theme="hc-dark"] {
      --bg:           #000000;
      --text:         #ffffff;
      --muted:        #ffffff;
      --border:       #ffffff;
      --popover-bg:   #000000;
      --haze-opacity: 1;
      --fade:         0ms;
    }

    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      transition: background var(--fade), color var(--fade);
    }

    /* ── Writing area ──────────────────────────────────────────────── */
    #editor-container {
      position: fixed;
      inset: 0;
      padding: 3rem;
      display: flex;
      align-items: flex-start;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      min-height: 1.5em;
      outline: none;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 18px;
      line-height: 1.8;
      font-family: 'Merriweather', serif;
      white-space: pre-wrap;
      word-break: break-word;
      caret-color: var(--text);
    }

    /* Slow pulsing caret */
    @keyframes caret-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    #editor:focus { caret-color: var(--text); animation: none; }

    /* ── Word spans ────────────────────────────────────────────────── */
    .word {
      transition: opacity var(--fade), filter var(--fade);
    }


    /* narrowwrite mode: one blur on the group container → single GPU op */
    body.mode-narrowwrite #haze-group {
      filter: blur(var(--blur-amount));
      opacity: var(--haze-opacity);
      will-change: filter;
    }

    /* HC: replace blur with full hide — no blur artifacts on e-ink/LCD */
    :is([data-theme="hc-light"], [data-theme="hc-dark"]) body.mode-narrowwrite #haze-group {
      filter: none;
      opacity: 0;
      will-change: auto;
    }

    /* blank past classic: fade to invisible, keep layout */
    body.mode-blankpast.style-classic .word[data-state="hidden"] {
      opacity: 0;
      pointer-events: none;
    }

    /* blank past typewriter: remove from layout so visible words shift */
    body.mode-blankpast.style-typewriter .word[data-state="hidden"] {
      display: none;
    }

    /* ── Typewriter layout ─────────────────────────────────────────── */
    body.mode-blankpast.style-typewriter #editor-container {
      /* Occupy exactly the left half — right edge sits at screen center */
      left: 0;
      right: 50%;
      top: 0;
      bottom: 0;
      padding: 0 1rem;
      align-items: center;     /* vertical center */
      overflow: hidden;        /* clip text that exceeds left edge */
    }

    body.mode-blankpast.style-typewriter #editor {
      width: 100%;             /* fill the left-half container */
      min-width: 0;            /* flex children default to min-width:auto, which lets
                                  the div expand to fit nowrap text wider than the
                                  container — overriding that keeps the width truly fixed */
      overflow: hidden;        /* clip old text scrolling left; cursor stays at right edge */
      white-space: nowrap;     /* single line — no wrapping */
      word-break: normal;
      text-align: right;       /* cursor pinned to right edge = screen center */
    }

    /* ── Word count ────────────────────────────────────────────────── */
    #word-count {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.7rem;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.08em;
      color: var(--muted);
      user-select: none;
      pointer-events: none;
    }

    /* ── Settings button ───────────────────────────────────────────── */
    #settings-btn {
      position: fixed;
      top: 0.75rem;
      right: 0.75rem;
      background: none;
      border: none;
      padding: 0.75rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 0;
      transition: color 0.2s, opacity 0.2s;
      opacity: 0.5;
      z-index: 200;
      touch-action: manipulation;
    }

    #theme-btn {
      position: fixed;
      top: 0.75rem;
      left: 0.75rem;
      background: none;
      border: none;
      padding: 0.75rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 0;
      transition: color 0.2s, opacity 0.2s;
      opacity: 0.5;
      z-index: 200;
      touch-action: manipulation;
    }

    #settings-btn:hover,
    #theme-btn:hover { opacity: 1; color: var(--text); }

    /* HC: button and word count always fully visible */
    :is([data-theme="hc-light"], [data-theme="hc-dark"]) #settings-btn,
    :is([data-theme="hc-light"], [data-theme="hc-dark"]) #theme-btn,
    :is([data-theme="hc-light"], [data-theme="hc-dark"]) #word-count { opacity: 1; color: var(--text); }

    /* ── Settings popover ──────────────────────────────────────────── */
    #settings-panel {
      position: fixed;
      top: 3.25rem;
      right: 1rem;
      width: 260px;
      background: var(--popover-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      max-height: calc(100dvh - 5rem);
      overflow-y: auto;

      /* hidden by default */
      display: none;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    #settings-panel.open    { display: block; }
    #settings-panel.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    /* ── Setting rows ──────────────────────────────────────────────── */
    .setting-row { margin-bottom: 0.9rem; }

    .setting-label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.35rem;
      font-family: 'Inter', sans-serif;
    }

    /* Label + icon on the same baseline */
    .setting-label-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 0.35rem;
    }
    .setting-label-row .setting-label { margin-bottom: 0; }

    .font-toggle-btn {
      display: inline-flex;
      align-items: center;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      color: var(--muted);
      line-height: 0;
      opacity: 0.7;
      transition: opacity 0.15s, color 0.15s;
    }
    .font-toggle-btn:hover          { opacity: 1; color: var(--text); }
    .font-toggle-btn.active         { color: var(--text); opacity: 1; }

    .setting-row select {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      padding: 0.3rem 0.5rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .setting-row select option { background: var(--popover-bg); color: var(--text); }

    /* Val-with-unit wrapper (e.g. font size + "px") */
    .val-with-unit {
      display: flex;
      align-items: center;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.3rem 0.5rem;
      transition: border-color 0.15s;
    }

    .val-with-unit:focus-within {
      border-color: var(--text);
    }

    .val-unit {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      user-select: none;
      pointer-events: none;
    }

    .slider-val {
      font-size: 12px;
      color: var(--text);
      min-width: 0;
      width: 100%;
      font-family: 'Inter', sans-serif;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      outline: none;
      padding: 0.3rem 0.5rem;
      cursor: text;
      transition: border-color 0.15s;
    }

    /* Inside a val-with-unit, the input is borderless — wrapper holds the border */
    .val-with-unit .slider-val {
      border: none;
      border-radius: 0;
      padding: 0;
      flex: 1;
    }

    .slider-val:focus {
      border-color: var(--text);
    }

    .val-with-unit .slider-val:focus {
      border-color: transparent;
    }

    /* Mode picker */
    .mode-picker {
      display: flex;
      gap: 0.5rem;
    }

    .mode-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.25rem;
      padding: 0.5rem 0.6rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s;
    }

    .mode-btn.active { border-color: var(--text); }

    .mode-name {
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text);
    }

    .mode-desc {
      font-size: 0.62rem;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      line-height: 1.3;
    }

    /* Blank Past style sub-picker */
    .style-picker {
      display: flex;
      gap: 0.4rem;
    }

    .style-btn {
      flex: 1;
      padding: 0.25rem 0.5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.72rem;
      font-family: 'Inter', sans-serif;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s;
    }

    .style-btn.active {
      border-color: var(--text);
      color: var(--text);
    }

    /* Toggle rows */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle-row input[type="checkbox"] { cursor: pointer; }

    /* Divider */
    .setting-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.75rem 0;
    }

    /* Action buttons */
    .action-btn {
      width: 100%;
      padding: 0.4rem 0.5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.78rem;
      cursor: pointer;
      text-align: center;
      display: block;
      transition: background 0.15s;
      margin-bottom: 0.5rem;
      font-family: 'Inter', sans-serif;
    }

    .action-btn:hover { background: rgba(128, 128, 128, 0.12); }

    .action-btn.danger       { color: #e06060; border-color: rgba(224, 96, 96, 0.35); }
    .action-btn.danger:hover { background: rgba(224, 96, 96, 0.1); }

    /* Clear confirm area */
    #clear-confirm {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }

    #clear-confirm-btns {
      display: flex;
      gap: 0.4rem;
    }

    #clear-confirm-btns .action-btn { margin-bottom: 0; flex: 1; }

    /* ── Mobile adjustments ────────────────────────────────────────── */
    @media (max-width: 600px) {
      #editor-container { padding: 3.5rem 1.25rem 2rem; }
      #editor { font-size: 16px; }
      #settings-panel { right: 0.5rem; width: calc(100vw - 1rem); }
    }
  </style>
</head>

<body class="mode-narrowwrite style-classic">

  <!-- Writing area -->
  <div id="editor-container">
    <div id="editor"
         contenteditable="true"
         spellcheck="false"
         autocorrect="on"
         autocapitalize="sentences"
         aria-label="Writing area"
         aria-multiline="true"
         role="textbox"></div>
  </div>

  <!-- Word count -->
  <div id="word-count" aria-live="polite" aria-atomic="true">0</div>

  <!-- Theme cycle button — always on canvas, no panel needed -->
  <button id="theme-btn" aria-label="Cycle theme">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="1 4 1 10 7 10"/>
      <polyline points="23 20 23 14 17 14"/>
      <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
    </svg>
  </button>

  <!-- Settings button -->
  <button id="settings-btn" aria-label="Open settings" aria-expanded="false">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="4"  y1="21" x2="4"  y2="14"/>
      <line x1="4"  y1="10" x2="4"  y2="3"/>
      <line x1="12" y1="21" x2="12" y2="12"/>
      <line x1="12" y1="8"  x2="12" y2="3"/>
      <line x1="20" y1="21" x2="20" y2="16"/>
      <line x1="20" y1="12" x2="20" y2="3"/>
      <line x1="1"  y1="14" x2="7"  y2="14"/>
      <line x1="9"  y1="8"  x2="15" y2="8"/>
      <line x1="17" y1="16" x2="23" y2="16"/>
    </svg>
  </button>

  <!-- Settings popover -->
  <div id="settings-panel" role="dialog" aria-label="Settings">

    <!-- Mode picker -->
    <div class="setting-row mode-picker">
      <button class="mode-btn active" data-mode="narrowwrite">
        <span class="mode-name">Haze</span>
        <span class="mode-desc">Blurs words behind you</span>
      </button>
      <button class="mode-btn" data-mode="blankpast">
        <span class="mode-name">Blank Past</span>
        <span class="mode-desc">Past words disappear</span>
      </button>
    </div>

    <!-- Blank Past style sub-picker (hidden unless Blank Past active) -->
    <div class="setting-row style-picker" id="s-style-row" style="display:none">
      <button class="style-btn active" data-style="classic">Classic</button>
      <button class="style-btn" data-style="typewriter">Typewriter</button>
    </div>

    <!-- Visible words -->
    <div class="setting-row">
      <span class="setting-label">Visible words</span>
      <input type="text" class="slider-val" id="s-visible-words-val" value="10" aria-label="Visible words value">
    </div>

    <!-- Font family -->
    <div class="setting-row">
      <div class="setting-label-row">
        <span class="setting-label">Font</span>
        <button id="font-toggle-btn" class="font-toggle-btn" title="Type a custom font name">
          <!-- pencil icon -->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
      <select id="s-font">
        <option value="Merriweather">Merriweather</option>
        <option value="Lora">Lora</option>
        <option value="Playfair Display">Playfair Display</option>
        <option value="Inter">Inter</option>
        <option value="DM Sans">DM Sans</option>
        <option value="JetBrains Mono">JetBrains Mono</option>
      </select>
      <input type="text" class="slider-val" id="s-custom-font"
             placeholder="Font name, e.g. Georgia" aria-label="Custom font name"
             style="display:none">
    </div>

    <!-- Font size -->
    <div class="setting-row">
      <span class="setting-label">Font size</span>
      <input type="text" class="slider-val" id="s-font-size-val" value="18" aria-label="Font size">
    </div>

    <!-- Line spacing -->
    <div class="setting-row">
      <span class="setting-label">Line spacing</span>
      <input type="text" class="slider-val" id="s-line-spacing-val" value="1.8" aria-label="Line spacing value">
    </div>

    <!-- Theme -->
    <div class="setting-row">
      <div class="setting-label-row">
        <span class="setting-label">Theme</span>
        <button id="theme-cycle-btn" class="font-toggle-btn" title="Cycle theme">
          <!-- cycle arrows icon -->
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <polyline points="23 20 23 14 17 14"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
      </div>
      <select id="s-theme">
        <option value="system">System</option>
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="hc-light">HC Light</option>
        <option value="hc-dark">HC Dark</option>
      </select>
    </div>


    <hr class="setting-divider">

    <!-- Copy all -->
    <button class="action-btn" id="copy-btn">Copy all</button>

    <!-- Clear document -->
    <div id="clear-area">
      <button class="action-btn danger" id="clear-btn">Clear document</button>
    </div>

  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────

    const state = {
      content: '',
      settings: {
        visibleWords:   10,
        mode:           'narrowwrite',
        blankPastStyle: 'classic',
        fontFamily:     'Merriweather',
        customFont:     '',
        fontSize:       18,
        lineSpacing:    1.8,
        theme:          'dark',
      },
    };

    // ── DOM refs ───────────────────────────────────────────────────────────────

    const editor          = document.getElementById('editor');
    const editorContainer = document.getElementById('editor-container');
    const wordCountEl   = document.getElementById('word-count');
    const settingsBtn   = document.getElementById('settings-btn');
    const themeBtnEl    = document.getElementById('theme-btn');
    const settingsPanel = document.getElementById('settings-panel');

    const sVisibleWordsVal = document.getElementById('s-visible-words-val');
    const sModeBtns        = document.querySelectorAll('.mode-btn');
    const sStyleRow        = document.getElementById('s-style-row');
    const sStyleBtns       = document.querySelectorAll('.style-btn');
    const sFont            = document.getElementById('s-font');
    const sFontToggleBtn   = document.getElementById('font-toggle-btn');
    const sCustomFontVal   = document.getElementById('s-custom-font');
    const sFontSizeVal     = document.getElementById('s-font-size-val');
    const sLineSpacingVal  = document.getElementById('s-line-spacing-val');
    const sTheme           = document.getElementById('s-theme');
    const sThemeCycleBtn   = document.getElementById('theme-cycle-btn');
    const copyBtn          = document.getElementById('copy-btn');
    const clearArea        = document.getElementById('clear-area');

    // Font stacks per family
    const fontStacks = {
      'Merriweather':    "'Merriweather', Georgia, serif",
      'Lora':            "'Lora', Georgia, serif",
      'Playfair Display':"'Playfair Display', Georgia, serif",
      'Inter':           "'Inter', system-ui, sans-serif",
      'DM Sans':         "'DM Sans', system-ui, sans-serif",
      'JetBrains Mono':  "'JetBrains Mono', monospace",
    };

    // ── localStorage ───────────────────────────────────────────────────────────

    function loadState() {
      const savedContent  = localStorage.getItem('narrowwrite_content');
      const savedSettings = localStorage.getItem('narrowwrite_settings');

      if (savedContent)  state.content = savedContent;
      if (!savedSettings) return;

      Object.assign(state.settings, JSON.parse(savedSettings));
    }

    let saveTimer = null;

    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveState, 500);
    }

    function saveState() {
      localStorage.setItem('narrowwrite_content',  state.content);
      localStorage.setItem('narrowwrite_settings', JSON.stringify(state.settings));
    }

    // ── Word rendering ─────────────────────────────────────────────────────────

    // Split into alternating [word, whitespace, word, …] tokens
    function tokenise(text) {
      return text.split(/(\s+)/).filter(t => t.length > 0);
    }

    function isWhitespace(token) {
      return /^\s+$/.test(token);
    }

    function countWords(tokens) {
      return tokens.filter(t => !isWhitespace(t)).length;
    }

    // Find the token index where the visible window starts
    function findVisibleStart(tokens, visibleWords) {
      let wordsSeen = 0;

      for (let i = tokens.length - 1; i >= 0; i--) {
        if (isWhitespace(tokens[i])) continue;
        wordsSeen++;
        if (wordsSeen >= visibleWords) return i;
      }

      return 0;
    }

    // Build a .word span for the given token
    function renderToken(token, dataState) {
      const span = document.createElement('span');
      span.className = 'word';
      span.dataset.state = dataState;

      // Use non-breaking space so trailing spaces aren't collapsed
      // (matters in right-aligned typewriter mode)
      span.textContent = token.replace(/ /g, '\u00a0');

      return span;
    }

    // Max tokens to render before the visible window.
    // Caps DOM size regardless of how much content exists above the fold.
    const RENDER_BUFFER = 800;

    // ── Incremental render state ────────────────────────────────────────────────
    // Tracks last full-render result so typing within a word skips full rebuild.
    let _renderTokenCount  = 0;
    let _renderVisibleFrom = -1;
    let _currentWordSpan   = null;

    function invalidateRenderCache() {
      _currentWordSpan = null;
    }

    function renderWords() {
      const tokens      = tokenise(state.content);
      const totalWords  = countWords(tokens);
      const visibleFrom = findVisibleStart(tokens, state.settings.visibleWords);
      const isTypewriter = state.settings.mode === 'blankpast' &&
                           state.settings.blankPastStyle === 'typewriter';

      // ── Fast path ────────────────────────────────────────────────────────────
      // Applies when the user typed a character within the current word:
      //   • token count unchanged  → no word boundary crossed
      //   • visibleFrom unchanged  → visible window didn't shift
      //   • span ref valid         → we have a live node to update
      if (
        _currentWordSpan &&
        tokens.length === _renderTokenCount &&
        visibleFrom  === _renderVisibleFrom
      ) {
        _currentWordSpan.textContent =
          tokens[tokens.length - 1].replace(/ /g, '\u00a0');
        updateWordCount(totalWords);
        return;
      }

      // ── Full re-render ────────────────────────────────────────────────────────
      // In Haze mode, wrap all hidden tokens in one container and blur that
      // container — one GPU composite op instead of one per hidden span.
      const renderFrom = Math.max(0, visibleFrom - RENDER_BUFFER);
      const isHaze     = state.settings.mode === 'narrowwrite';
      const hazeGroup  = isHaze ? document.createElement('span') : null;
      if (hazeGroup) hazeGroup.id = 'haze-group';

      const fragment = document.createDocumentFragment();
      for (let i = renderFrom; i < tokens.length; i++) {
        const tok = renderToken(tokens[i], i >= visibleFrom ? 'visible' : 'hidden');
        if (i < visibleFrom && hazeGroup) {
          hazeGroup.appendChild(tok);
        } else {
          fragment.appendChild(tok);
        }
      }

      if (hazeGroup && hazeGroup.hasChildNodes()) {
        fragment.prepend(hazeGroup);
      }
      editor.innerHTML = '';
      editor.appendChild(fragment);
      trimOverflow();

      // Cache for next incremental check
      _renderTokenCount  = tokens.length;
      _renderVisibleFrom = visibleFrom;
      _currentWordSpan   = editor.lastElementChild;

      updateWordCount(totalWords);
    }

    // Hide word spans from the top until content fits inside the container.
    // Uses batch reads then batch writes to avoid layout thrashing.
    // Skipped in typewriter mode (single-line, handled by its own layout).
    function trimOverflow() {
      const isTypewriter = state.settings.mode === 'blankpast' && state.settings.blankPastStyle === 'typewriter';
      if (isTypewriter) return;

      const cs         = window.getComputedStyle(editorContainer);
      const availableH = editorContainer.clientHeight
                         - parseFloat(cs.paddingTop)
                         - parseFloat(cs.paddingBottom);

      if (editor.scrollHeight <= availableH) return;

      const spans  = Array.from(editor.querySelectorAll('.word'));
      const excess = editor.scrollHeight - availableH;

      // Batch reads — no DOM writes between these, so browser reuses one layout pass
      const heights = spans.map(s => s.getBoundingClientRect().height);

      // Find how many spans to hide from the top to cover the excess
      let accum = 0, hideCount = 0;
      for (let i = 0; i < heights.length; i++) {
        if (accum >= excess) break;
        accum += heights[i];
        hideCount++;
      }

      // Batch writes
      for (let i = 0; i < hideCount; i++) {
        spans[i].style.display = 'none';
      }
    }

    function updateWordCount(count) {
      wordCountEl.textContent = count;
    }

    // ── Cursor ─────────────────────────────────────────────────────────────────

    function placeCursorAtEnd() {
      const range    = document.createRange();
      const lastSpan = editor.lastElementChild;
      // Collapse into the last span, not after it.
      // Collapsing after the span causes Firefox/Safari to insert the next
      // typed character as a stray text node directly in #editor rather than
      // inside the span, leading to characters appearing twice.
      range.selectNodeContents(lastSpan ?? editor);
      range.collapse(false);

      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    // ── Apply settings to DOM ──────────────────────────────────────────────────

    function applyBodyClasses() {
      const { mode, blankPastStyle } = state.settings;
      document.body.className = `mode-${mode} style-${blankPastStyle}`;
    }

    // Switch the font control between dropdown and free-text input
    function setFontMode(isCustom) {
      sFont.style.display        = isCustom ? 'none'  : '';
      sCustomFontVal.style.display = isCustom ? ''    : 'none';
      sFontToggleBtn.classList.toggle('active', isCustom);
      if (isCustom) {
        sCustomFontVal.focus();
        sCustomFontVal.select();
      }
    }

    function applyEditorStyles() {
      const { fontFamily, customFont, fontSize, lineSpacing } = state.settings;
      const ff = fontFamily === 'custom'
        ? (customFont ? `'${customFont}', serif` : "'Merriweather', Georgia, serif")
        : (fontStacks[fontFamily] || fontStacks['Merriweather']);
      editor.style.fontFamily = ff;
      editor.style.fontSize   = `${fontSize}px`;
      editor.style.lineHeight = lineSpacing;
    }

    function applyTheme() {
      const theme = state.settings.theme;
      const resolved = theme === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : theme;
      document.documentElement.setAttribute('data-theme', resolved);
    }

    function syncControls() {
      const s = state.settings;
      sVisibleWordsVal.value    = s.visibleWords;
      sModeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === s.mode));
      sStyleRow.style.display   = s.mode === 'blankpast' ? 'flex' : 'none';
      sStyleBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.style === s.blankPastStyle));
      sFont.value               = s.fontFamily === 'custom' ? 'Merriweather' : s.fontFamily;
      setFontMode(s.fontFamily === 'custom');
      sCustomFontVal.value      = s.customFont || '';
      sFontSizeVal.value        = s.fontSize;
      sLineSpacingVal.value     = s.lineSpacing.toFixed(1);
      sTheme.value              = s.theme;
    }

    function applySettings() {
      applyBodyClasses();
      applyEditorStyles();
      applyTheme();
      syncControls();
    }

    // ── Settings panel ─────────────────────────────────────────────────────────

    let _settingsOpen = false;

    function openSettings() {
      _settingsOpen = true;
      settingsPanel.classList.add('open');
      settingsBtn.setAttribute('aria-expanded', 'true');
      requestAnimationFrame(() => settingsPanel.classList.add('visible'));
    }

    function closeSettings() {
      _settingsOpen = false;
      settingsPanel.classList.remove('visible');
      settingsBtn.setAttribute('aria-expanded', 'false');
      const cleanup = () => settingsPanel.classList.remove('open');
      settingsPanel.addEventListener('transitionend', cleanup, { once: true });
      setTimeout(cleanup, 300); // fallback if transitionend never fires (e.g. keyboard resize on mobile)
    }

    function isSettingsOpen() {
      return _settingsOpen;
    }

    // ── Copy all ───────────────────────────────────────────────────────────────

    function copyAll() {
      navigator.clipboard.writeText(state.content).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy all'; }, 1500);
      });
    }

    // ── Clear document ─────────────────────────────────────────────────────────

    function showClearConfirm() {
      clearArea.innerHTML = `
        <p id="clear-confirm">Are you sure? This cannot be undone.</p>
        <div id="clear-confirm-btns">
          <button class="action-btn danger" id="confirm-clear-btn">Yes, clear</button>
          <button class="action-btn" id="cancel-clear-btn">Cancel</button>
        </div>
      `;
      document.getElementById('confirm-clear-btn').addEventListener('click', e => { e.stopPropagation(); confirmClear(); });
      document.getElementById('cancel-clear-btn').addEventListener('click', e => { e.stopPropagation(); resetClearArea(); });
    }

    function confirmClear() {
      state.content = '';
      editor.innerHTML = '';
      updateWordCount(0);
      saveState();
      resetClearArea();
      closeSettings();
      editor.focus();
    }

    function resetClearArea() {
      clearArea.innerHTML = `<button class="action-btn danger" id="clear-btn">Clear document</button>`;
      document.getElementById('clear-btn').addEventListener('click', e => { e.stopPropagation(); showClearConfirm(); });
    }

    // ── Input handling ─────────────────────────────────────────────────────────

    function handleInput(e) {
      // Use InputEvent API to update state.content WITHOUT reading the DOM.
      // Reading editor.textContent inside an input handler causes Firefox/Safari
      // to re-apply queued input events on the rebuilt DOM, producing exponential
      // character duplication ("Whhaha thhehe…"). By deriving the new content
      // from e.inputType + e.data instead, we never touch the stale DOM.
      const type = e.inputType ?? '';

      // Intermediate IME composition — text not committed yet; skip.
      // The final commit arrives as insertFromComposition → default branch.
      if (type === 'insertCompositionText') return;

      switch (type) {
        case 'insertText':
          state.content += (e.data ?? '');
          break;

        case 'insertParagraph':
        case 'insertLineBreak':
          // blankpast mode intercepts Enter in keydown (preventDefault),
          // so this only fires in narrowwrite mode — treat as newline.
          state.content += '\n';
          break;

        case 'deleteContentBackward':
          if (state.content.length === 0) return;
          state.content = state.content.slice(0, -1);
          break;

        case 'deleteContentForward':
        case 'deleteWordForward':
          // Cursor is always at end; nothing exists after it.
          return;

        case 'deleteWordBackward':
          if (state.content.length === 0) return;
          // Remove the last word plus any trailing whitespace after it.
          state.content = state.content.replace(/\S+\s*$/, '');
          break;

        case 'deleteSoftLineBackward':
        case 'deleteHardLineBackward': {
          if (state.content.length === 0) return;
          const nl = state.content.lastIndexOf('\n');
          state.content = nl >= 0 ? state.content.slice(0, nl) : '';
          break;
        }

        default:
          // Undo, redo, drag-drop, IME commit, cut, etc.
          // These are infrequent — falling back to the DOM here is safe
          // because the duplication bug is caused by rapid fire insertText
          // events, not by one-off operations like undo.
          state.content = editor.textContent.replace(/\u00a0/g, ' ');
          break;
      }

      renderWords();
      placeCursorAtEnd();
      scheduleSave();
    }

    function handleKeydown(e) {
      // Intercept Enter in Blank Past — record it but don't render a visible line break
      if (state.settings.mode === 'blankpast' && e.key === 'Enter') {
        e.preventDefault();
        state.content += '\n';
        renderWords();
        placeCursorAtEnd();
        scheduleSave();
        return;
      }

    }

    function handlePaste(e) {
      e.preventDefault();
      const text = e.clipboardData.getData('text/plain');

      const isTypewriter = state.settings.mode === 'blankpast' && state.settings.blankPastStyle === 'typewriter';

      if (isTypewriter) {
        state.content += text;
        renderWords();
        placeCursorAtEnd();
        scheduleSave();
        return;
      }

      document.execCommand('insertText', false, text);
    }

    // ── Settings change handlers ───────────────────────────────────────────────

    function onModeChange(mode) {
      state.settings.mode = mode;
      invalidateRenderCache();
      sModeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      sStyleRow.style.display = mode === 'blankpast' ? 'flex' : 'none';
      applyBodyClasses();
      renderWords();
      scheduleSave();
    }

    function onStyleChange(style) {
      state.settings.blankPastStyle = style;
      invalidateRenderCache();
      sStyleBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.style === style));
      applyBodyClasses();
      renderWords();
      scheduleSave();
    }

    function onFontChange() {
      state.settings.fontFamily = sFont.value;
      applyEditorStyles();
      scheduleSave();
    }

    function onCustomFontInput() {
      state.settings.customFont = sCustomFontVal.value.trim();
      applyEditorStyles();
      scheduleSave();
    }

    function onVisibleWordsValInput() {
      const raw = parseInt(sVisibleWordsVal.value, 10);
      if (isNaN(raw)) return;
      const clamped = Math.min(100, Math.max(1, raw));
      state.settings.visibleWords = clamped;
      sVisibleWordsVal.value      = clamped;
      renderWords();
      scheduleSave();
    }

    function onFontSizeValInput() {
      const raw = parseInt(sFontSizeVal.value, 10);
      if (isNaN(raw)) return;
      const clamped = Math.min(99, Math.max(8, raw));
      state.settings.fontSize = clamped;
      sFontSizeVal.value      = clamped;
      editor.style.fontSize   = `${clamped}px`;
      scheduleSave();
    }

    function onLineSpacingValInput() {
      const raw = parseFloat(sLineSpacingVal.value);
      if (isNaN(raw)) return;
      const clamped = Math.min(3.0, Math.max(1.0, parseFloat(raw.toFixed(1))));
      state.settings.lineSpacing = clamped;
      sLineSpacingVal.value      = clamped.toFixed(1);
      editor.style.lineHeight    = clamped;
      scheduleSave();
    }

    function onSliderValKeydown(e, applyFn) {
      if (e.key === 'Enter') { e.preventDefault(); applyFn(); e.target.blur(); }
      if (e.key === 'Escape') { e.preventDefault(); syncControls(); e.target.blur(); }
    }

    function onThemeChange() {
      state.settings.theme = sTheme.value;
      applyTheme();
      scheduleSave();
    }

    // ── Wire events ────────────────────────────────────────────────────────────

    function wireEvents() {
      editor.addEventListener('input',   handleInput);
      editor.addEventListener('keydown', handleKeydown);
      editor.addEventListener('paste',   handlePaste);

      settingsBtn.addEventListener('touchstart', e => {
        e.preventDefault();   // suppress the ghost click Android generates after touch
        e.stopPropagation();
        isSettingsOpen() ? closeSettings() : openSettings();
      }, { passive: false });

      settingsBtn.addEventListener('click', e => {
        e.stopPropagation();
        isSettingsOpen() ? closeSettings() : openSettings();
      });

      document.addEventListener('click', e => {
        if (settingsBtn.contains(e.target)) return;
        if (settingsPanel.contains(e.target)) return;
        if (isSettingsOpen()) closeSettings();
        editor.focus();
        // In typewriter mode the cursor must always sit at the end (screen centre).
        // Override wherever the browser placed it from the click.
        const isTypewriter = state.settings.mode === 'blankpast' && state.settings.blankPastStyle === 'typewriter';
        if (isTypewriter) placeCursorAtEnd();
      });

      sVisibleWordsVal.addEventListener('blur',    onVisibleWordsValInput);
      sVisibleWordsVal.addEventListener('keydown', e => onSliderValKeydown(e, onVisibleWordsValInput));
      sModeBtns.forEach(btn  => btn.addEventListener('click', () => onModeChange(btn.dataset.mode)));
      sStyleBtns.forEach(btn => btn.addEventListener('click', () => onStyleChange(btn.dataset.style)));
      sFont.addEventListener('change',         onFontChange);
      sFontToggleBtn.addEventListener('click', () => {
        const goCustom = state.settings.fontFamily !== 'custom';
        if (goCustom) {
          state.settings.fontFamily = 'custom';
        } else {
          state.settings.fontFamily = sFont.value || 'Merriweather';
        }
        setFontMode(goCustom);
        applyEditorStyles();
        scheduleSave();
      });
      sCustomFontVal.addEventListener('input',   onCustomFontInput);
      sCustomFontVal.addEventListener('blur',    onCustomFontInput);
      sCustomFontVal.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); onCustomFontInput(); sCustomFontVal.blur(); } });
      sFontSizeVal.addEventListener('blur',    onFontSizeValInput);
      sFontSizeVal.addEventListener('keydown', e => onSliderValKeydown(e, onFontSizeValInput));
      sLineSpacingVal.addEventListener('blur',    onLineSpacingValInput);
      sLineSpacingVal.addEventListener('keydown', e => onSliderValKeydown(e, onLineSpacingValInput));
      sTheme.addEventListener('change',        onThemeChange);
      const cycleTheme = () => {
        const themes = ['system', 'dark', 'light', 'hc-light', 'hc-dark'];
        const next   = themes[(themes.indexOf(state.settings.theme) + 1) % themes.length];
        sTheme.value = next;
        onThemeChange();
      };
      sThemeCycleBtn.addEventListener('click', cycleTheme);
      themeBtnEl.addEventListener('click',     cycleTheme);

      // Keep System theme in sync when OS preference changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (state.settings.theme === 'system') applyTheme();
      });
      copyBtn.addEventListener('click',        copyAll);
      document.getElementById('clear-btn').addEventListener('click', e => { e.stopPropagation(); showClearConfirm(); });
    }

    // ── Startup ────────────────────────────────────────────────────────────────

    function init() {
      loadState();
      applySettings();

      if (state.content) {
        renderWords();
        placeCursorAtEnd();
      }

      wireEvents();
      editor.focus();
    }

    init();
  </script>
</body>
</html>
