name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── 1. Compute the next semver tag ────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag:     ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        run: |
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}"   >> "$GITHUB_OUTPUT"

  # ── 2a. Build Chrome extension ────────────────────────────────────────────
  extension:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pillow

      - name: Build extension
        run: python scripts/build-extension.py --version "${{ needs.version.outputs.version }}"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/narrow-write-extension-v${{ needs.version.outputs.version }}.zip

  # ── 2b. Build Android APK ─────────────────────────────────────────────────
  android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install pillow

      - name: Build web assets
        run: python scripts/build-extension.py --version "${{ needs.version.outputs.version }}"

      - name: Copy web assets into Android project
        run: cp -r dist/extension/. android/app/src/main/assets/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: |
          gradle \
            -p android \
            -PversionCode=${{ github.run_number }} \
            -PversionName=${{ needs.version.outputs.version }} \
            assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             narrow-write-${{ needs.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: narrow-write-${{ needs.version.outputs.version }}.apk

  # ── 3. Tag + create GitHub Release with both artifacts ────────────────────
  release:
    needs: [version, extension, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download extension zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Tag release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.version.outputs.tag }}" \
            "narrow-write-extension-v${{ needs.version.outputs.version }}.zip" \
            "narrow-write-${{ needs.version.outputs.version }}.apk" \
            --title "${{ needs.version.outputs.tag }}" \
            --notes "Built from [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
