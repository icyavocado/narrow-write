name: Build & Release Chrome Extension

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to read all tags for version bump

      - name: Compute next version
        id: ver
        run: |
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=${NEXT}"    >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}"       >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pillow

      - name: Build extension
        run: python scripts/build-extension.py --version "${{ steps.ver.outputs.version }}"

      - name: Tag release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            "dist/narrow-write-extension-${{ steps.ver.outputs.version }}.zip" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes "Built from [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
